    </p>
    <p id="conference"></p>
    <div id="example-table" align="center" style="width:750"></div>

    <script type="text/javascript" src="conf_data.json"></script>

    <link href="dist/css/tabulator.min.css" rel="stylesheet">
    <script type="text/javascript" src="dist/js/tabulator.min.js"></script>
    <script>
        tableHdr = '<TR BORDER=1 BGCOLOR="#CF7C00">' +
            '<th> <font color="white"><b>Conference<b></font>' +
            '<th> <font color="white"><b>Year<b></font>' +
            '<th> <font color="white"><b>Full Paper<b></font>' +
            '<th> <font color="white"><b>Review<b></font>' +
            '<th> <font color="white"><b>Pages<b></font>' +
	    '<th> <font color="white"><b>Venue<b></font>' +
            '</tr>'

        confTable = "<table border=1 align=center width=600>" + tableHdr;
        confData.forEach(genTable);
        confTable += "</table>";
        document.getElementById("conference").innerHTML = confTable;

        function genTable(value) {
            confTable += "<tr>"
            confTable += "<td>" + value.name + "</td>";
            confTable += "<td> <a href=" + value.url + ">" + value.year + "</a></td>";
            confTable += "<td>" + value.full + "</td>";
            confTable += "<td>" + value.notif + "</td>";
            confTable += "<td>" + value.page + "</td>";
            confTable += "<td>" + value.venue + "</td>";
            confTable += "</tr>"
        }

        var table = new Tabulator("#example-table", {
 	    //height:205, // set height of table (in CSS or here), this enables the Virtual DOM and improves render speed dramatically (can be any valid css height value)
            //width: 800,
 	    data:confData, //assign data to table
 	    layout:"fitColumns", //fit columns to width of table (optional)
 	    columns:[ //Define Table Columns
                {title:"Name", field:"name", width:100},
	 	{title:"Year", field:"url", align:"left", formatter:"link", formatterParams:{labelField:"year"}, width:80},
	 	{title:"Full Paper", field:"full", width:100},
	 	{title:"Review", field:"notif", sorter:"date", align:"center", width:100},
	 	{title:"Conference", field:"conf", sorter:"date", align:"center", width:120},
	 	{title:"Pages", field:"page", width:100},
	 	{title:"Venue", field:"venue", width:150},
 	    ],
// 	rowClick:function(e, row){ //trigger an alert message when the row is clicked
// 		alert("Row " + row.getData().id + " Clicked!!!!");
// 	},

        });

    </script>
