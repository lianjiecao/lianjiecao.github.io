<html>
    <head>
    <meta http-equiv="content-type" content="text/html; charset=us-ascii">
    <title>Networking conferences</title>
    <link rel="stylesheet" type="text/css" href="css/style.css"/>
    </head>

    <body>
    <h1>Conferences</h1><br/>

    <a href="#osdi">OSDI</a>,
    <a href="#sigcomm">SIGCOMM</a>,
    <a href="#infocom">INFOCOM</a>,
    <a href="#sosp">SOSP</a>,
    <a href="#nsdi">NSDI</a>,
    <a href="#icnp">ICNP</a>,
    <a href="#conext">CoNEXT</a>,
    <a href="#icdcs">ICDCS</a>,

    <a href="#ndss">NDSS</a>
    <p></p>
    <br>


    <hr>
    <p id="conf">
    <center>
    <TABLE BORDER=1 ALIGN=CENTER WIDTH=1000>
    <TR BORDER=1 BGCOLOR="#CF7C00">
    <td> <font color="white"><b>Conference<b></font>
    <td> <font color="white"><b>Year<b></font>
    <td> <font color="white"><b>Paper Submission<b></font>
    <td> <font color="white"><b>Acceptance Notification<b></font>
    </tr>

    <a name="sigcomm">
    <tr>
    <td rowspan="2"> SIGCOMM
    <td rowspan="2"> <a href="http://conferences.sigcomm.org/sigcomm/2014/index.php">2014</a>
    <td> Regular paper: <a href="http://conferences.sigcomm.org/sigcomm/2014/cfp.php">Jan. 31st</a>
    <td> Mar. 14th
    </tr>
    <td> Poster and demo: <a href="http://conferences.sigcomm.org/sigcomm/2014/cfpd.php">May 16th</a>
    <td> June 2nd
    </tr>

    <a name="icnp">
    <tr>
    <td rowspan="2"> ICNP
    <td rowspan="2"> <a href="http://icnp14.cs.unc.edu/">2014</a>
    <td> Regular paper: May 9th
    <td rowspan="2"> July 4th
    </tr>
    <td> Concise paper: <a href="http://icnp14.cs.unc.edu/cfp.html">May 23rd</a>

    </table></center>

    </p>
    <p id="journal"></p>

<script>
    var fs=require('fs');
    var data=fs.readFileSync('conference.json', 'utf8');
    var conf=JSON.parse(data);
    var text = "<ul>";
    conf.forEach(genTable);
    text += "</ul>";
    document.getElementById("journal").innerHTML = text;

    function genTable(value) {
        text += "<li>" + value.name + "</li>";
    }
</script>

    </body>
</html>
